<div class="signup-container">

  <div class="signup-card">

    <h2>Create Account</h2>
    <p class="subtitle">Register to access Paradise Stays</p>

    <form #signupForm="ngForm" (ngSubmit)="signup()">

      <!-- Username -->

      <div class="form-group">

        <label>Username</label>

        <input
          type="text"
          name="username"
          [(ngModel)]="signupUsername"
          #username="ngModel"
          required
          minlength="3"
          placeholder="Enter username"
        />

        <div class="error" *ngIf="username.invalid && username.touched">

          <small *ngIf="username.errors?.['required']">
            Username is required
          </small>

          <small *ngIf="username.errors?.['minlength']">
            Minimum 3 characters required
          </small>

        </div>

      </div>


      <!-- Password -->

      <div class="form-group">

        <label>Password</label>

        <input
          type="password"
          name="password"
          [(ngModel)]="signupPassword"
          #password="ngModel"
          required
          minlength="6"
          placeholder="Enter password"
        />

        <div class="error" *ngIf="password.invalid && password.touched">

          <small *ngIf="password.errors?.['required']">
            Password is required
          </small>

          <small *ngIf="password.errors?.['minlength']">
            Password must be at least 6 characters
          </small>

        </div>

      </div>


      <!-- Role -->

      <div class="form-group">

        <label>Role</label>

        <select
          name="role"
          [(ngModel)]="signupRole"
        >

          <option value="Admin">Admin</option>
          <option value="Staff">Staff</option>

        </select>

      </div>


      <!-- Error message -->

      <div class="error-message" *ngIf="error">
        {{ error }}
      </div>


      <!-- Submit Button -->

      <button
        type="submit"
        [disabled]="signupForm.invalid || loading"
      >

        <span *ngIf="!loading">Sign Up</span>
        <span *ngIf="loading">Creating Account...</span>

      </button>

    </form>

  </div>

</div>
