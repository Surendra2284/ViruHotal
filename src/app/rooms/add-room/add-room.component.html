<div class="add-room-wrapper">
  <div class="room-card">

    <h2 class="title">🛏️ Add New Room</h2>
    <p class="subtitle">Create a new room for Varanasi Hindu Hotel</p>

    <form (ngSubmit)="save()">

      <div class="form-group">
        <label>Room Number</label>
        <input [(ngModel)]="room.roomNumber" name="roomNumber" required />
      </div>

      <div class="form-group">
        <label>Room Type</label>
        <input [(ngModel)]="room.type" name="type" required placeholder="AC / Deluxe / Non-AC" />
      </div>

      <div class="form-group">
        <label>Price (₹)</label>
        <input [(ngModel)]="room.price" name="price" required type="number" placeholder="Enter price" />
      </div>

      <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="room.status" name="status">
          <option value="Available">Available</option>
          <option value="Occupied">Occupied</option>
        </select>
      </div>

      <button class="save-btn" type="submit">
        💾 Save Room
      </button>
    </form>

  </div>
</div>
