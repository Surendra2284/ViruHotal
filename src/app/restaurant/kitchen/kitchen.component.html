<div *ngFor="let o of pendingOrders" class="order-card">

  <h3>🍽 Room: {{ getRoomNameFromOrder(o.room) }}</h3>
  <p>👤 Customer: {{ getCustomerNameFromOrder(o.room) }}</p>

  <div *ngFor="let it of o.items">
    <p>🍛 {{ it.itemId.name }} × {{ it.quantity }}</p>
  </div>

  <p><strong>Total:</strong> ₹{{ o.total }}</p>

  <button (click)="markDelivered(o._id)">✔ Mark Delivered</button>
</div>
