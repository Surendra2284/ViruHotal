<h2 class="title">🛒 Motlu Patlu Rasoi – Place Order</h2>
<!-- Search Bar -->
<div class="customer-box">
  <label>Search Customer (name / phone)</label>
  <input type="text" [(ngModel)]="searchKey" (input)="searchCustomer()">

  <!-- Add New Customer Button -->
  <button class="add-btn" (click)="openNewCustomer()">+ Add New Customer</button>

  <div class="search-list" *ngIf="customers.length > 0">
    <div *ngFor="let c of customers" (click)="selectCustomer(c)">
      {{ c.name }} - {{ c.phone }}
    </div>
  </div>
</div>

<!-- Add Customer Modal -->
<div class="modal-bg" *ngIf="newCustomerVisible">
  <div class="modal">
    <h2>Add New Customer</h2>

    <input type="text" placeholder="Name" [(ngModel)]="newCustomer.name">
    <input type="text" placeholder="Phone" [(ngModel)]="newCustomer.phone">
    <input type="email" placeholder="Email" [(ngModel)]="newCustomer.email">
    <textarea placeholder="Address" [(ngModel)]="newCustomer.address"></textarea>

    <div class="btn-group">
      <button class="save-btn" (click)="saveNewCustomer()">Save</button>
      <button class="cancel-btn" (click)="closeNewCustomer()">Cancel</button>
    </div>
  </div>
</div>

<!-- Direct Entry If Not Found -->

<!-- ROOM SELECT -->
<div class="room-box">
  <label>Select Room *</label>
  <select class="form-select" [(ngModel)]="order.room" name="room">
    <option value="">Select Room</option>
    <option *ngFor="let b of bookings" [ngValue]="b._id">
      Room {{ b.room.roomNumber }} - {{ b.customerName }}
    </option>
  </select>
</div>

<!-- DIRECT CUSTOMER DETAILS -->
<div class="customer-box" *ngIf="!order.room">
  <h3>Direct Customer Details</h3>
  <label>Name *</label>
  <input type="text" [(ngModel)]="order.customer.name" name="customerName" class="form-control" />
  <label>Phone *</label>
  <input type="text" [(ngModel)]="order.customer.phone" name="customerPhone" class="form-control" />
</div>

<!-- MENU GRID -->
<div class="menu-grid">
  <div class="item-card" *ngFor="let m of menu">
    <h3>{{ m.name }}</h3>
    <p class="cat">Category: {{ m.category }}</p>
    <p class="price">₹{{ m.price }}</p>

    <!-- Quantity Controls -->
    <!-- Quantity Controls -->
    <div class="qty-box">
      <!-- Decrease button -->
      <button class="qty-btn minus" (click)="m.qty = m.qty > 0 ? m.qty - 1 : 0">-</button>

      <!-- Current quantity -->
      <span class="qty">{{ m.qty }}</span>

      <!-- Increase button -->
      <button class="qty-btn plus" (click)="m.qty = m.qty + 1">+</button>

  </div>
</div>

<!-- SUMMARY BAR -->
<div class="summary-bar">
  <div class="total">
    Total: ₹{{ totalCost }}
  </div>

  <button class="place-btn" (click)="placeOrder()">
    ✔ Place Order
  </button>
</div>
