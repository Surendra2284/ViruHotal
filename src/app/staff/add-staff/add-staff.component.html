
<div class="container">

  <div class="card">
    <h2>Add Staff Member</h2>

    <!-- Error Message -->
    <div class="error" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="save()">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="data.name" name="name" placeholder="Enter staff name">
      </div>

      <div class="form-group">
        <label>Role</label>
        <input type="text" [(ngModel)]="data.role" name="role" placeholder="Enter role (e.g. Cook, Manager)">
      </div>

      <div class="form-group">
        <label>Salary</label>
        <input type="number" [(ngModel)]="data.salary" name="salary" placeholder="Enter salary">
      </div>

      <button type="submit" class="btn-save">Save Staff</button>

    </form>
  </div>

</div>
